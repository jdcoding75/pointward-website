<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Pointward</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta property="og:title" content="You have a thought waiting on Pointward">
<meta property="og:description" content="Someone sent you a thought — tap to see it.">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0d0d14; color: #e8e0f0;
  font-family: -apple-system, sans-serif;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; text-align: center; padding: 24px; overflow-x: hidden;
}
.wrap { max-width: 360px; width: 100%; position: relative; }

.kicker { font-size: 15px; letter-spacing: 0.01em; color: #b8a9cc; margin-bottom: 18px; }

/* ---- the teaser stage: per-style sky + swappable animated core ---- */
.teaser-stage { position: relative; width: 100%; height: 210px; border-radius: 20px;
  overflow: hidden; margin: 0 auto 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.35); }
.teaser-sky { position: absolute; inset: 0; transition: background 0.3s ease; }
.teaser-core { position: absolute; inset: 0; }
.teaser-core svg { width: 100%; height: 100%; display: block; }
/* shared star twinkle (cores drop <circle class="st">) */
.st { fill: #ffffff; animation: tkstar 3s ease-in-out infinite; }
@keyframes tkstar { 0%,100%{opacity:0.18} 50%{opacity:0.9} }

/* ---- compass arrival animation (page-scoped .mc-*; mirrors app VintageFaceView).
   Mounted by coreGlow — the compass instrument travels as wire style "glow"
   (Instrument.compass.senderStyle == .glow). ---- */
.mc-wrap { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
.mc-face { position: relative; width: 200px; height: 200px; border-radius: 50%; }
.mc-art { position: absolute; inset: 0; width: 200px; height: 200px; }
.mc-flash { position: absolute; left: 50%; top: 50%; width: 150px; height: 150px; margin: -75px 0 0 -75px;
  border-radius: 50%; background: radial-gradient(circle, rgba(255,215,0,0.55) 0%, rgba(255,215,0,0) 68%); opacity: 0; z-index: 2; animation: mc-flash 6s ease-out infinite; }
.mc-breath { position: absolute; left: 50%; top: 50%; width: 92px; height: 92px; margin: -46px 0 0 -46px;
  border-radius: 50%; border: 1px solid rgba(196,168,212,0.22); animation: mc-breathe 4s ease-in-out infinite; }
.mc-lock, .mc-lock2 { position: absolute; left: 50%; top: 50%; width: 80px; height: 80px; margin: -40px 0 0 -40px;
  border-radius: 50%; border: 1.5px solid rgba(255,215,0,0.8); box-shadow: 0 0 10px rgba(255,215,0,0.5); opacity: 0; }
.mc-lock { animation: mc-lock 6s ease-out infinite; }
.mc-lock2 { animation: mc-lock2 6s ease-out infinite; }
.mc-needle { position: absolute; left: 50%; top: 50%; width: 14px; height: 140px; margin: -70px 0 0 -7px;
  transform: rotate(0deg); transform-origin: 50% 50%; animation: mc-seek 6s cubic-bezier(.45,.05,.25,1) infinite; }
.mc-needle i { position: absolute; left: 0; width: 0; height: 0; }
.mc-needle .mc-nN { top: 4px; border-left: 7px solid transparent; border-right: 7px solid transparent; border-bottom: 62px solid #FFD700; }
.mc-needle .mc-nS { bottom: 4px; left: 1px; border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 46px solid #8b6914; }
.mc-emoji { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%) scale(1); font-size: 34px; line-height: 1; z-index: 3; animation: mc-emoji 6s ease-in-out infinite; }
.mc-hub { position: absolute; left: 50%; top: 50%; width: 8px; height: 8px; margin: -4px 0 0 -4px; border-radius: 50%; background: #221a0e; border: 1px solid #c9a86a; z-index: 4; }
@keyframes mc-seek { 0%{transform:rotate(-122deg)} 40%{transform:rotate(14deg)} 48%{transform:rotate(-7deg)} 54%{transform:rotate(3deg)} 60%{transform:rotate(0deg)} 80%{transform:rotate(0deg)} 100%{transform:rotate(-122deg)} }
@keyframes mc-lock { 0%,56%{opacity:0;transform:scale(.4)} 62%{opacity:1;transform:scale(1)} 82%{opacity:0;transform:scale(2)} 100%{opacity:0} }
@keyframes mc-lock2 { 0%,60%{opacity:0;transform:scale(.4)} 66%{opacity:.8;transform:scale(1)} 86%{opacity:0;transform:scale(2.5)} 100%{opacity:0} }
@keyframes mc-flash { 0%,56%{opacity:0} 62%{opacity:.6} 80%{opacity:0} 100%{opacity:0} }
@keyframes mc-breathe { 0%,100%{transform:scale(.96);opacity:.5} 50%{transform:scale(1.05);opacity:.85} }
@keyframes mc-emoji { 0%,56%{transform:translate(-50%,-50%) scale(1)} 62%{transform:translate(-50%,-50%) scale(1.3)} 70%{transform:translate(-50%,-50%) scale(.95)} 78%{transform:translate(-50%,-50%) scale(1.07)} 100%{transform:translate(-50%,-50%) scale(1)} }

.reveal-cta { font-size: 16px; color: #c4a8d4; font-weight: 500; letter-spacing: 0.01em; margin-bottom: 24px; }

/* ---- generic fallback core ---- */
.gen { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
.gen-shimmer { position: absolute; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(196,168,212,0.22) 0%, transparent 70%); animation: genshim 4.5s ease-in-out infinite; }
@keyframes genshim { 0%,100%{opacity:.3;transform:scale(.85)} 50%{opacity:.6;transform:scale(1.1)} }
.gen-halo { position: absolute; width: 120px; height: 120px; border-radius: 50%; background: #6b4a9e; animation: genglow 3.4s ease-in-out infinite; }
@keyframes genglow { 0%,100%{opacity:0.25;transform:scale(0.9)} 50%{opacity:0.55;transform:scale(1.08)} }
.gen-emoji { position: relative; font-size: 64px; line-height: 1; animation: genfloat 3.4s ease-in-out infinite; }
@keyframes genfloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }

/* ---- CTA (existing install button) ---- */
.btn { display: block; background: #3a2e50; border: 1px solid #7c6b8e; color: #e8e0f0;
  padding: 15px; border-radius: 14px; text-decoration: none; font-size: 16px; font-weight: 500;
  position: relative; overflow: hidden; }
.btn span { position: relative; z-index: 1; }
.btn::after { content: ""; position: absolute; inset: 0;
  background: linear-gradient(105deg, transparent 30%, rgba(196,168,212,0.30) 50%, transparent 70%);
  background-size: 240px 100%; background-repeat: no-repeat; animation: shine 3s ease-in-out infinite; }
@keyframes shine { 0%{background-position:-180px} 100%{background-position:320px} }
.trust { font-size: 12px; color: #6b5f7a; letter-spacing: 0.03em; margin-top: 12px; }
.code { font-size: 12px; color: #4a3860; margin-top: 26px; line-height: 1.6; }
.code b { font-weight: 500; letter-spacing: 0.12em; color: #6b5f7a; }

.state { color: #8a7ba0; font-size: 16px; line-height: 1.7; }
.state .mark { font-size: 52px; margin-bottom: 18px; }
#content, #notfound { display: none; }
@media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
</style>
<style id="core-style"></style>
</head>
<body>
<div class="wrap">

  <div id="loading" class="state">opening your thought&hellip;</div>

  <div id="notfound" class="state">

    -->
  </div>
</div>

<script>
/* =========================================================== */
var INSTALL_URL = "https://testflight.apple.com/join/rjAS4cnk";
var SB_URL = "https://jlbgdlgwtrkmqcfnomlr.supabase.co";
var SB_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsYmdkbGd3dHJrbXFjZm5vbWxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NjYwODYsImV4cCI6MjA5NjM0MjA4Nn0.QN0-lU4LrxEjUUqsR0r2dtZHeDbSajSHXeyb3H_NcHM";

function showOnly(id){ ['loading','content','notfound'].forEach(function(x){ document.getElementById(x).style.display = (x===id?'block':'none'); }); }
function getMessageId(){ var p=window.location.pathname, a=p.split('/m/')[1]; if(a){return a.replace(/\/+$/,'').split('?')[0].split('#')[0];} return new URLSearchParams(window.location.search).get('id')||null; }
function isMessagePath(){ return window.location.pathname.indexOf('/m/')!==-1 || new URLSearchParams(window.location.search).get('id'); }
function copyLink(){ try{ var id=getMessageId(); if(id&&navigator.clipboard){ navigator.clipboard.writeText("https://pointward.app/m/"+id).catch(function(){}); } }catch(e){} }
function notFound(){ document.getElementById('nf-btn').href=INSTALL_URL; showOnly('notfound'); }
function escapeHtml(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

/* ===========================================================
   WEB MESSAGE TEASERS — shared frame + registry + 9 cores
   A core is: function(ctx) -> { sky, css, html }  (ctx = {emoji, name})
   sky = stage background; css = scoped @keyframes+rules; html = the scene.
   Keys MUST equal SenderStyle.rawValue (camelCase exact). Each core is a
   2s-feel loop that NEVER completes its ritual (the incomplete-ritual hook).
   =========================================================== */
var SKY = {
  night:     'linear-gradient(180deg,#1a2d4a 0%,#0e1e38 100%)',
  space:     'radial-gradient(circle at 50% 120%,#141029 0%,#08070f 70%)',
  day:       'linear-gradient(180deg,#87CEEB 0%,#E8F4F8 100%)',
  twilight:  'linear-gradient(180deg,#24314f 0%,#0e1e30 100%)',
  magic:     'radial-gradient(circle at 50% 60%,#37205e 0%,#140b24 75%)',
  nearblack: 'linear-gradient(180deg,#181324 0%,#06070c 100%)',
  brand:     'radial-gradient(circle at 50% 45%,#1a1426 0%,#0d0d14 72%)'
};
function stars(list){ var s=''; for(var i=0;i<list.length;i++){ var c=list[i]; s+='<circle class="st" cx="'+c[0]+'" cy="'+c[1]+'" r="'+(c[2]||1)+'" style="animation-delay:'+(c[3]||0)+'s"/>'; } return s; }

/* Vintage compass face marks — ticks(15°)/numbers(30°)/letters, mirrors app VintageFaceView (r92/r73/r54). */
function mcFaceMarks(){
  var s='', i, deg, rad, is90, len, x1, y1, x2, y2;
  for(deg=0; deg<360; deg+=15){
    rad=deg*Math.PI/180; is90=(deg%90===0); len=is90?10:7;
    x1=100+Math.sin(rad)*92; y1=100-Math.cos(rad)*92;
    x2=100+Math.sin(rad)*(92-len); y2=100-Math.cos(rad)*(92-len);
    s+='<line x1="'+x1.toFixed(1)+'" y1="'+y1.toFixed(1)+'" x2="'+x2.toFixed(1)+'" y2="'+y2.toFixed(1)+'" stroke="'+(is90?'#e3c887':'#c9a86a')+'" stroke-width="'+(is90?1.2:0.8)+'" stroke-opacity="'+(is90?1:0.9)+'"/>';
  }
  for(deg=0; deg<360; deg+=30){
    rad=deg*Math.PI/180; x1=100+Math.sin(rad)*73; y1=100-Math.cos(rad)*73;
    s+='<text x="'+x1.toFixed(1)+'" y="'+y1.toFixed(1)+'" transform="rotate('+deg+' '+x1.toFixed(1)+' '+y1.toFixed(1)+')" text-anchor="middle" dominant-baseline="central" font-size="8" font-family="monospace" fill="'+(deg%90===0?'#e3c887':'#c9a86a')+'" fill-opacity="'+(deg%90===0?1:0.85)+'">'+deg+'</text>';
  }
  var card=['N','E','S','W'], inter=['NE','SE','SW','NW'];
  for(i=0;i<4;i++){ rad=i*90*Math.PI/180; x1=100+Math.sin(rad)*54; y1=100-Math.cos(rad)*54;
    s+='<text x="'+x1.toFixed(1)+'" y="'+y1.toFixed(1)+'" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" font-family="Georgia,serif" fill="'+(i===0?'#e3c887':'#c9a86a')+'">'+card[i]+'</text>'; }
  for(i=0;i<4;i++){ rad=(45+i*90)*Math.PI/180; x1=100+Math.sin(rad)*54; y1=100-Math.cos(rad)*54;
    s+='<text x="'+x1.toFixed(1)+'" y="'+y1.toFixed(1)+'" text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="600" font-family="Georgia,serif" fill="#c9a86a" fill-opacity=".9">'+inter[i]+'</text>'; }
  return s;
}

/* ---------- GENERIC fallback (brand sky, emoji + halo) ---------- */
function coreGeneric(ctx){
  return { sky: SKY.brand, css: '',
    html: '<div class="gen"><div class="gen-shimmer"></div><div class="gen-halo"></div><div class="gen-emoji">'+escapeHtml(ctx.emoji||'💭')+'</div></div>' };
}

/* ---------- ROCKET (space) — 3·2·1 numerals, orange exhaust, never launches ---------- */
function coreRocket(ctx){
  return { sky: SKY.space,
    css: '@keyframes rk_shake{0%,100%{transform:translate(0,0)}25%{transform:translate(-.54px,.36px)}50%{transform:translate(.54px,-.27px)}75%{transform:translate(-.36px,.45px)}}'
       + '@keyframes rk_fl{0%,100%{opacity:.55;transform:scaleY(.7)}50%{opacity:1;transform:scaleY(1.2)}}'
       + '@keyframes rk_c3{0%,28%{opacity:1}34%,100%{opacity:0}}@keyframes rk_c2{0%,30%{opacity:0}36%,61%{opacity:1}67%,100%{opacity:0}}@keyframes rk_c1{0%,63%{opacity:0}69%,94%{opacity:1}100%{opacity:0}}'
       + '@keyframes rk_smoke{0%{opacity:0;transform:translateY(0) scale(.5)}30%{opacity:.5}100%{opacity:0;transform:translateY(6px) scale(1.5)}}'
       + '.rk{animation:rk_shake .13s linear infinite}.rk-fl{animation:rk_fl .45s ease-in-out infinite;transform-box:fill-box;transform-origin:center top}'
       + '.rk-c3{animation:rk_c3 3.8s ease-in-out infinite}.rk-c2{animation:rk_c2 3.8s ease-in-out infinite}.rk-c1{animation:rk_c1 3.8s ease-in-out infinite}'
       + '.rk-sm{animation:rk_smoke 1.4s ease-out infinite}',
    html: '<svg viewBox="0 0 300 152">'+stars([[40,30,1,0],[250,26,1.2,1],[70,120,1,.6],[230,118,1,1.4],[150,18,1,.3]])
       + '<text x="150" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#FFD27a" class="rk-c3">3</text>'
       + '<text x="150" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#FFD27a" class="rk-c2">2</text>'
       + '<text x="150" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#FFD27a" class="rk-c1">1</text>'
       + '<ellipse class="rk-sm" cx="138" cy="132" rx="9" ry="5" fill="#cfc4dd" opacity=".4"/><ellipse class="rk-sm" cx="162" cy="132" rx="10" ry="5" fill="#cfc4dd" opacity=".4" style="animation-delay:.5s"/>'
       + '<g class="rk-fl"><path d="M142 116 L150 144 L158 116 Z" fill="#e0622c"/><path d="M146 116 L150 134 L154 116 Z" fill="#FFD27a"/></g>'
       + '<g class="rk"><path d="M150 50 L140 78 L160 78 Z" fill="#d9d2e6"/><rect x="140" y="76" width="20" height="44" rx="8" fill="#f1ecf7"/>'
       + '<circle cx="150" cy="92" r="5" fill="#7c5da6"/><circle cx="150" cy="92" r="5" fill="none" stroke="#e6dcf2" stroke-width="1.2"/>'
       + '<path d="M140 108 L132 124 L140 120 Z" fill="#b29ed0"/><path d="M160 108 L168 124 L160 120 Z" fill="#b29ed0"/></g>'
       + '<rect x="134" y="144" width="32" height="4" rx="2" fill="#6b5f7a"/></svg>' };
}

/* ---------- FIREWORK (space) — firework with its fuse LIT + sparkling, never bursts ---------- */
function coreFirework(ctx){
  return { sky: SKY.space,
    css: '@keyframes fw_spark{0%,100%{opacity:.4;transform:scale(.6)}50%{opacity:1;transform:scale(1.3)}}'
       + '@keyframes fw_emit{0%{opacity:1;transform:translate(0,0)}100%{opacity:0;transform:translate(var(--dx),var(--dy))}}'
       + '@keyframes fw_prime{0%,100%{opacity:.22}50%{opacity:.5}}'
       + '.fw-core{animation:fw_spark .3s ease-in-out infinite;transform-box:fill-box;transform-origin:center}'
       + '.fw-e{animation:fw_emit .7s ease-out infinite}.fw-glow{animation:fw_prime 1.6s ease-in-out infinite}'
       + '@keyframes fw_trem{0%,100%{transform:translate(0,0)}50%{transform:translate(.3px,-.2px)}}.fw-body{animation:fw_trem .2s linear infinite}',
    html: '<svg viewBox="0 0 300 152">'+stars([[36,34,1,0],[260,30,1.1,.8],[80,118,1,.4],[214,120,1,1.2],[150,18,1.2,.2]])
       + '<ellipse class="fw-glow" cx="150" cy="100" rx="26" ry="30" fill="#ff7a3c"/>'              /* primed glow */
       + '<rect x="138" y="132" width="24" height="3" rx="1.5" fill="#6b5f7a"/>'                     /* stand */
       + '<g class="fw-body"><path d="M150 72 L138 86 L162 86 Z" fill="#ffd24a"/>'                     /* nose cone */
       + '<rect x="138" y="84" width="24" height="48" rx="4" fill="#d23b3b"/>'                        /* tube */
       + '<rect x="138" y="94" width="24" height="6" fill="#ffd24a"/><rect x="138" y="112" width="24" height="6" fill="#ffd24a"/></g>' /* stripes */
       + '<path d="M150 72 Q132 60 128 46" fill="none" stroke="#cfc4dd" stroke-width="1.6"/>'         /* fuse */
       + '<g transform="translate(128,46)"><circle class="fw-core" r="5.1" fill="#ffeb3b" opacity=".5"/><circle class="fw-core" r="2.7" fill="#fff" style="animation-delay:.1s"/>'
       + '<circle class="fw-e" r="1.1" fill="#ffeb3b" style="--dx:-8px;--dy:-6px"/>'
       + '<circle class="fw-e" r=".95" fill="#fff" style="--dx:7px;--dy:-7px;animation-delay:.15s"/>'
       + '<circle class="fw-e" r="1" fill="#ffd24a" style="--dx:-5px;--dy:-10px;animation-delay:.3s"/>'
       + '<circle class="fw-e" r=".85" fill="#ff9a3c" style="--dx:9px;--dy:-3px;animation-delay:.45s"/>'
       + '<circle class="fw-e" r=".95" fill="#fff" style="--dx:2px;--dy:-11px;animation-delay:.55s"/></g></svg>' };
}

/* ---------- BIRTHDAY (near-black) — candles flicker, never blown ---------- */
function coreBirthday(ctx){
  return { sky: SKY.nearblack,
    css: '@keyframes bd_light{0%{opacity:0;transform:scaleY(0)}9%{opacity:1;transform:scaleY(1.18)}16%{transform:scaleY(.9)}24%{transform:scaleY(1.1)}34%{transform:scaleY(.97)}78%{opacity:1;transform:scaleY(1.05)}90%{opacity:0;transform:scaleY(.2)}100%{opacity:0;transform:scaleY(0)}}'
       + '@keyframes bd_spark{0%,4%{opacity:0;transform:scale(.2)}9%{opacity:1;transform:scale(1)}16%{opacity:0;transform:scale(1.4)}100%{opacity:0}}'
       + '@keyframes bd_gl{0%,8%{opacity:0}26%{opacity:.6}80%{opacity:.55}94%,100%{opacity:0}}'
       + '@keyframes bd_conf{0%{opacity:0;transform:translateY(-4px)}15%{opacity:.9}100%{opacity:0;transform:translateY(96px)}}'
       + '.bd-fl{animation:bd_light 3s ease-in-out infinite;transform-box:fill-box;transform-origin:center bottom}'
       + '.bd-sp{animation:bd_spark 3s ease-out infinite;transform-box:fill-box;transform-origin:center}'
       + '.bd-gl{animation:bd_gl 3s ease-in-out infinite}.bd-c{animation:bd_conf 2.6s linear infinite}',
    html: '<svg viewBox="0 0 300 152">'
       + '<ellipse class="bd-gl" cx="150" cy="96" rx="64" ry="30" fill="#ffcaa0" opacity=".4"/>'
       + '<rect class="bd-c" x="96" y="20" width="4" height="7" rx="1.5" fill="#FFD700"/><rect class="bd-c" x="204" y="22" width="4" height="7" rx="1.5" fill="#ff8fb0" style="animation-delay:1.3s"/>'
       + '<rect x="108" y="96" width="84" height="34" rx="6" fill="#e7d3bf"/><rect x="108" y="96" width="84" height="9" rx="4" fill="#f4e7da"/>'
       + '<rect x="126" y="70" width="4" height="22" rx="2" fill="#d98cc0"/><g class="bd-fl"><path d="M128 60 Q124 68 128 70 Q132 68 128 60 Z" fill="#ffd76a"/></g><circle class="bd-sp" cx="128" cy="60" r="2.4" fill="#fff6cf"/>'
       + '<rect x="148" y="66" width="4" height="26" rx="2" fill="#8cc0e0"/><g class="bd-fl" style="animation-delay:.28s"><path d="M150 56 Q146 64 150 66 Q154 64 150 56 Z" fill="#ffd76a"/></g><circle class="bd-sp" cx="150" cy="56" r="2.4" fill="#fff6cf" style="animation-delay:.28s"/>'
       + '<rect x="170" y="70" width="4" height="22" rx="2" fill="#9ad6a0"/><g class="bd-fl" style="animation-delay:.56s"><path d="M172 60 Q168 68 172 70 Q176 68 172 60 Z" fill="#ffd76a"/></g><circle class="bd-sp" cx="172" cy="60" r="2.4" fill="#fff6cf" style="animation-delay:.56s"/></svg>' };
}

/* ---------- GLOW (night) — orb + expanding gold ring, never completes impact ---------- */
/* GLOW = the COMPASS arrival. The compass instrument travels as wire style "glow"
   (Instrument.compass.senderStyle == .glow), so this renders the vintage brass
   compass with a lock "wow" moment. Mounts the .mc-* markup (CSS lives in <head>).
   Prior glow-orb core preserved in git history (commit e7ca95a). */
function coreGlow(ctx){
  return { sky: SKY.brand, css: '',
    html: '<div class="mc-wrap"><div class="mc-face">'
       + '<svg class="mc-art" viewBox="0 0 200 200" aria-hidden="true">'

/* ---------- REGISTRY + pure selector ---------- */
var TEASERS = {
  glow: coreGlow, bowArrow: coreBow, firefly: coreFirefly, fingerFlick: coreFlick,
  rocket: coreRocket, wand: coreWand, plane: corePlane, birthday: coreBirthday, firework: coreFirework
};
function teaserFor(style){ var k=(style==null?'':(''+style)).trim(); return (k && TEASERS[k]) ? TEASERS[k] : coreGeneric; }

function mountTeaser(style, ctx){
  var core = teaserFor(style)(ctx) || {};
  document.getElementById('core-style').textContent = core.css || '';
  document.getElementById('teaser-sky').style.background = core.sky || SKY.brand;
  document.getElementById('teaser-core').innerHTML = core.html || '';
}

/* Pure-function unit test (run in console or add ?teasertest=1). */
function teaserSelfTest(){
  var keys=['glow','bowArrow','firefly','fingerFlick','rocket','wand','plane','birthday','firework'], ok=true;
  keys.forEach(function(k){ if(typeof teaserFor(k)!=='function'||teaserFor(k)===coreGeneric){ ok=false; console.error('teaser missing/wrong for',k); } });
  ['shootingStar',null,undefined,'','nope'].forEach(function(k){ if(teaserFor(k)!==coreGeneric){ ok=false; console.error('fallback failed for',k); } });
  console.log('teaser self-test:', ok?'PASS':'FAIL'); return ok;
}

function render(msg){
  if(!msg){ notFound(); return; }
  var name = msg.sender_display_name || 'someone';
  document.getElementById('kicker-name').textContent = name;
  document.getElementById('reveal-name').textContent = name;
  /* read the field that's already there → pick a teaser. content is NEVER rendered. */
  mountTeaser(msg.instrument, { emoji: msg.emoji || '💭', name: name });
  /* recipient-facing short-code prompt removed (dead branch — source has no short_code field). Original preserved:
  if(msg.short_code){ document.getElementById('short-code').textContent = msg.short_code; document.getElementById('code-line').style.display='block'; } */
  document.getElementById('open-btn').href = INSTALL_URL;
  /* deliberately NOT calling mark_opened — a web glance is not an in-app read. */
  showOnly('content');
}

function load(){
  document.getElementById('nf-btn').onclick = copyLink;
  document.getElementById('open-btn').onclick = copyLink;
  if(new URLSearchParams(window.location.search).get('teasertest')==='1'){ teaserSelfTest(); }
  /* preview hook: 404.html?demo=rocket (or any style / "generic") renders a sample teaser, no fetch */
  var demo = new URLSearchParams(window.location.search).get('demo');
  if(demo){ render({ sender_display_name:'John', emoji:'💭', instrument:(demo==='generic'?null:demo) }); return; }
  if(!isMessagePath()){ notFound(); return; }
  var id=getMessageId(); if(!id){ notFound(); return; }
  fetch(SB_URL+"/rest/v1/rpc/get_message",{ method:"POST", headers:{ "Content-Type":"application/json","apikey":SB_ANON,"Authorization":"Bearer "+SB_ANON }, body:JSON.stringify({ p_id:id }) })
    .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(function(rows){ render(Array.isArray(rows)?rows[0]:rows); })
    .catch(function(){ notFound(); });
}
window.onload = load;
</script>
